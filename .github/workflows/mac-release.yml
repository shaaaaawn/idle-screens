name: Mac Release

# Tag a release as mac-vX.Y.Z to build, sign, notarize, and publish the DMG.
on:
  push:
    tags:
      - 'mac-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build workspace packages
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build mac web bundle
        working-directory: apps/mac/web
        run: node build.mjs

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" build.keychain
          rm cert.p12

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials idle-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Sign, notarize, staple
        working-directory: apps/mac
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          NOTARY_PROFILE: idle-notary
        run: ./notarize.sh

      - name: Publish DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mac/dist/IdleScreens.dmg
          fail_on_unmatched_files: true
